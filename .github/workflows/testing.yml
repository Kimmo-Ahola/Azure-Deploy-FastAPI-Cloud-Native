name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16 # denna är bara för databastester
        env:
          POSTGRES_USER: tasks
          POSTGRES_PASSWORD: tasks
          POSTGRES_DB: tasks_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U tasks"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install -r requirements.txt

      - run: pytest
        env:
          TEST_DATABASE_URL: postgresql+psycopg2://tasks:tasks@localhost:5433/tasks_test