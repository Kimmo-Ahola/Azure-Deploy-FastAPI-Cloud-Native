# denna ska ersätta vår webhook
name: Deploy To Azure

on: 
  workflow_run:
    workflows: ["tests"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: azure/webapps-deploy@v3
        with:
          app-name: 'cloud-native-testing-deployment'
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          images: 'kimmoahola/fast-api-v2:${{ github.sha }}'